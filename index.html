<!DOCTYPE html>
<html>
<head>
  <title>My Low Poly World AR</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script type="module"
    src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js">
  </script>
  <style>
    body { margin: 0; background: #111; }
    model-viewer {
      width: 100vw;
      height: 100vh;
      --poster-color: #111;
    }
  </style>
</head>
<body>
  <model-viewer
    src="low-poly-world.glb"
    ar
    ar-modes="webxr scene-viewer quick-look"
    camera-controls
    auto-rotate
    shadow-intensity="1"
    exposure="1"
    alt="Low Poly World">
    <button slot="ar-button" style="position: absolute; bottom: 16px; left: 50%; transform: translateX(-50%); padding: 12px 24px; font-size: 16px; background-color: #fff; border: none; border-radius: 4px; cursor: pointer;">
      View in AR
    </button>
  </model-viewer>
</body>
</html>
